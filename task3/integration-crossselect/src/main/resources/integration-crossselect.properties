# 集成服务器（跨系选课模块）配置
# 说明：XSLT文件默认从工作区根目录的 ./xsl 读取

server.port=8090

# 目标院系跨系选课接收端（各院系应用提供 /crossSelect）
# B为成员2实现的dept-b-app；A/C为可选（仅在targetDept=A/C时需要）
# deptA.crossSelectUrl=http://localhost:8081/crossSelect
deptB.crossSelectUrl=http://localhost:8082/crossSelect
# deptC.crossSelectUrl=http://localhost:8083/crossSelect

xslt.dir=./xsl
